<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seattle Mariners — By Aaron Marin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0C2C56;
  --teal: #005C5C;
  --silver: #C4CED4;
  --white: #FFFFFF;
  --gold: #D4AF37;
  --dark: #05111F;
  --light-teal: #00A8A8;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--dark); color:var(--white); font-family:'Rajdhani',sans-serif; overflow-x:hidden; cursor:crosshair; }
::-webkit-scrollbar { width:8px; }
::-webkit-scrollbar-track { background:var(--dark); }
::-webkit-scrollbar-thumb { background:var(--teal); border-radius:4px; }
#starfield { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

/* LOADING */
#loading { position:fixed; inset:0; background:var(--dark); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .8s,visibility .8s; }
#loading.hidden { opacity:0; visibility:hidden; }
.loading-logo { font-family:'Bebas Neue',sans-serif; font-size:80px; color:var(--white); letter-spacing:.05em; animation:loadBlink 1s infinite; }
.loading-bar-track { width:300px; height:3px; background:rgba(255,255,255,.1); margin-top:30px; border-radius:2px; overflow:hidden; }
.loading-bar-fill { height:100%; background:var(--teal); animation:loadFill 1.5s ease-out forwards; }
@keyframes loadFill { 0%{width:0} 100%{width:100%} }
@keyframes loadBlink { 0%,100%{opacity:1} 50%{opacity:.4} }
.loading-sub { font-size:13px; letter-spacing:.5em; color:var(--silver); margin-top:16px; text-transform:uppercase; opacity:.6; }

/* HERO */
.hero { position:relative; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1; overflow:hidden; }
.hero-bg-grid { position:absolute; inset:0; background-image:linear-gradient(rgba(0,92,92,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(0,92,92,.12) 1px,transparent 1px); background-size:60px 60px; animation:gridScroll 20s linear infinite; }
@keyframes gridScroll { 0%{background-position:0 0} 100%{background-position:60px 60px} }
.hero-glow { position:absolute; width:800px; height:800px; border-radius:50%; background:radial-gradient(circle,rgba(0,92,92,.5) 0%,transparent 70%); animation:pulseGlow 4s ease-in-out infinite alternate; pointer-events:none; }
@keyframes pulseGlow { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(1.2);opacity:1} }
@keyframes fadeDown { 0%{opacity:0;transform:translateY(-30px)} 100%{opacity:1;transform:translateY(0)} }
@keyframes shimmer { 0%{background-position:0% center} 100%{background-position:200% center} }
@keyframes neonFlicker { 0%,95%,100%{opacity:1} 96%{opacity:.4} 97%{opacity:1} 98%{opacity:.2} 99%{opacity:1} }

.author-tag { font-size:clamp(14px,2vw,20px); letter-spacing:.5em; color:var(--silver); text-transform:uppercase; animation:fadeDown 1s ease forwards; opacity:0; animation-delay:.2s; margin-bottom:20px; }
.hero-title-row { display:flex; align-items:center; justify-content:center; gap:60px; flex-wrap:wrap; position:relative; z-index:2; }
.hero-titles { display:flex; flex-direction:column; align-items:flex-start; }
.big-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(60px,12vw,150px); letter-spacing:.05em; line-height:.85; background:linear-gradient(135deg,var(--white) 0%,var(--silver) 40%,var(--white) 60%,var(--light-teal) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:fadeDown 1s ease forwards,shimmer 3s linear infinite; background-size:200% auto; opacity:0; filter:drop-shadow(0 0 30px rgba(0,92,92,.6)); }
.author-name-big { font-family:'Bebas Neue',sans-serif; font-size:clamp(28px,5vw,64px); letter-spacing:.3em; color:var(--teal); text-shadow:0 0 20px var(--teal),0 0 40px rgba(0,92,92,.4); animation:fadeDown 1s ease forwards,neonFlicker 5s ease-in-out infinite; opacity:0; animation-delay:.8s; margin-top:10px; }
.hero-subtitle { font-family:'Oswald',sans-serif; font-size:clamp(14px,2.5vw,22px); letter-spacing:.4em; color:var(--silver); text-transform:uppercase; animation:fadeDown 1s ease forwards; opacity:0; animation-delay:1.3s; margin-top:10px; }

/* PHOTO */
.photo-wrap { position:relative; width:280px; height:280px; display:flex; align-items:center; justify-content:center; flex-shrink:0; animation:fadeDown 1.2s ease forwards; opacity:0; animation-delay:1s; }
.photo-ring { position:absolute; top:50%; left:50%; border-radius:50%; transform:translate(-50%,-50%); }
.pr1 { width:260px; height:260px; border:2px dashed rgba(0,92,92,.6); animation:spinCW 9s linear infinite; }
.pr2 { width:220px; height:220px; border:2px solid transparent; border-top-color:var(--teal); border-right-color:var(--teal); animation:spinCCW 5s linear infinite; }
.pr3 { width:190px; height:190px; border:1px solid rgba(196,206,212,.25); animation:pulseRing 2.2s ease-in-out infinite; }
@keyframes spinCW { 0%{transform:translate(-50%,-50%) rotate(0deg)} 100%{transform:translate(-50%,-50%) rotate(360deg)} }
@keyframes spinCCW { 0%{transform:translate(-50%,-50%) rotate(0deg)} 100%{transform:translate(-50%,-50%) rotate(-360deg)} }
@keyframes pulseRing { 0%,100%{opacity:.3;transform:translate(-50%,-50%) scale(1)} 50%{opacity:.8;transform:translate(-50%,-50%) scale(1.05)} }
.photo-orbit { position:absolute; top:50%; left:50%; width:260px; height:260px; transform:translate(-50%,-50%); animation:spinCW 7s linear infinite; z-index:4; }
.po { position:absolute; border-radius:50%; top:50%; left:50%; }
.po1 { width:12px; height:12px; background:var(--teal); box-shadow:0 0 12px var(--teal); transform:translate(-50%,-50%) translateX(130px); }
.po2 { width:8px; height:8px; background:var(--silver); box-shadow:0 0 8px var(--silver); transform:translate(-50%,-50%) rotate(90deg) translateX(130px); }
.po3 { width:10px; height:10px; background:#fff; box-shadow:0 0 10px #fff; transform:translate(-50%,-50%) rotate(180deg) translateX(130px); }
.po4 { width:7px; height:7px; background:var(--teal); box-shadow:0 0 7px var(--teal); transform:translate(-50%,-50%) rotate(270deg) translateX(130px); }
.photo-img { width:160px; height:160px; object-fit:cover; object-position:center top; border-radius:50%; border:4px solid var(--teal); position:relative; z-index:5; animation:photoFloat 5s ease-in-out infinite,photoGlow 3s ease-in-out infinite alternate; box-shadow:0 0 0 3px var(--navy),0 0 30px rgba(0,92,92,.9),0 0 60px rgba(0,92,92,.5); }
@keyframes photoFloat { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-12px)} }
@keyframes photoGlow { 0%{box-shadow:0 0 0 3px var(--navy),0 0 15px rgba(0,92,92,.6)} 100%{box-shadow:0 0 0 3px var(--navy),0 0 40px rgba(0,92,92,1),0 0 80px rgba(0,92,92,.6)} }
.pspark { position:absolute; width:18px; height:18px; z-index:6; }
.pspark::before,.pspark::after { content:''; position:absolute; background:var(--teal); border-radius:2px; }
.pspark::before { width:18px; height:2px; top:8px; left:0; }
.pspark::after { width:2px; height:18px; top:0; left:8px; }
.ps1{top:14px;left:14px;animation:sparkPulse 1.8s infinite 0s;}
.ps2{top:14px;right:14px;animation:sparkPulse 1.8s infinite .45s;}
.ps3{bottom:14px;left:14px;animation:sparkPulse 1.8s infinite .9s;}
.ps4{bottom:14px;right:14px;animation:sparkPulse 1.8s infinite 1.35s;}
@keyframes sparkPulse { 0%,100%{opacity:.3;transform:scale(1) rotate(0deg)} 50%{opacity:1;transform:scale(1.4) rotate(45deg)} }

.scroll-indicator { position:absolute; bottom:40px; display:flex; flex-direction:column; align-items:center; gap:8px; animation:fadeDown 1s ease forwards; opacity:0; animation-delay:1.8s; }
.scroll-text { font-size:12px; letter-spacing:.3em; color:var(--silver); opacity:.7; }
.scroll-line { width:1px; height:60px; background:linear-gradient(to bottom,var(--teal),transparent); animation:scrollPulse 2s ease-in-out infinite; }
@keyframes scrollPulse { 0%,100%{opacity:1;transform:scaleY(1)} 50%{opacity:.3;transform:scaleY(.5)} }

.section-divider { height:4px; background:linear-gradient(90deg,transparent,var(--teal),var(--navy),var(--teal),transparent); z-index:1; position:relative; animation:dividerSweep 3s linear infinite; background-size:200% 100%; }
@keyframes dividerSweep { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* MARQUEE */
.marquee-wrapper { background:var(--teal); padding:18px 0; overflow:hidden; position:relative; z-index:2; }
.marquee-track { display:flex; animation:marqueeScroll 22s linear infinite; white-space:nowrap; }
.marquee-item { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:.15em; color:var(--white); padding:0 40px; display:inline-flex; align-items:center; gap:20px; flex-shrink:0; }
.marquee-item span { color:rgba(255,255,255,.35); }
@keyframes marqueeScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

/* SECTIONS */
section { position:relative; z-index:1; padding:100px 40px; max-width:1400px; margin:0 auto; }
.section-label { font-size:13px; letter-spacing:.6em; color:var(--teal); text-transform:uppercase; margin-bottom:20px; display:flex; align-items:center; gap:15px; }
.section-label::before { content:''; display:block; width:40px; height:2px; background:var(--teal); }
.section-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(48px,8vw,100px); line-height:.9; letter-spacing:.02em; margin-bottom:40px; }

/* SCOREBOARD */
.scores-section { position:relative; z-index:1; background:linear-gradient(180deg,rgba(5,17,31,.95) 0%,rgba(12,44,86,.4) 100%); border-top:3px solid var(--teal); border-bottom:3px solid var(--teal); overflow:hidden; }
.scores-section::before { content:"MARINERS"; position:absolute; font-family:'Bebas Neue',sans-serif; font-size:280px; color:rgba(0,92,92,.06); top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; white-space:nowrap; }
.scores-inner { max-width:1400px; margin:0 auto; padding:80px 40px; position:relative; z-index:1; }
.live-dot-wrap { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.live-dot { width:10px; height:10px; border-radius:50%; background:var(--teal); animation:livePulse 1.2s infinite; display:none; } /* Hidden by default, script will show it */
@keyframes livePulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,92,92,.8)} 50%{box-shadow:0 0 0 8px rgba(0,92,92,0)} }
.live-label { font-size:13px; letter-spacing:.5em; color:var(--teal); text-transform:uppercase; }

.standing-banner { display:flex; align-items:center; justify-content:center; flex-wrap:wrap; background:var(--navy); border:1px solid rgba(0,92,92,.4); padding:30px 20px; margin-bottom:30px; position:relative; overflow:hidden; animation:bannerGlow 4s ease-in-out infinite alternate; }
@keyframes bannerGlow { 0%{box-shadow:0 0 20px rgba(12,44,86,.3)} 100%{box-shadow:0 0 40px rgba(0,92,92,.3)} }
.standing-item { text-align:center; padding:0 30px; flex:1; min-width:80px; }
.standing-val { font-family:'Bebas Neue',sans-serif; font-size:52px; color:var(--white); line-height:1; }
.standing-lbl { font-size:11px; letter-spacing:.4em; color:var(--silver); text-transform:uppercase; margin-top:6px; opacity:.7; }
.standing-divider { width:1px; height:60px; background:rgba(196,206,212,.2); flex-shrink:0; }

.next-game-card { background:linear-gradient(135deg,rgba(12,44,86,.9),rgba(5,17,31,.95)); border:2px solid var(--teal); padding:40px; margin-bottom:50px; position:relative; overflow:hidden; animation:nextGamePulse 3s ease-in-out infinite alternate; }
@keyframes nextGamePulse { 0%{border-color:var(--teal);box-shadow:0 0 20px rgba(0,92,92,.2)} 100%{border-color:var(--light-teal);box-shadow:0 0 50px rgba(0,92,92,.5)} }
.next-game-tag { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:.4em; color:var(--teal); margin-bottom:24px; display:flex; align-items:center; gap:12px; }

.next-game-matchup { display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap; }
.ng-team { text-align:center; flex:1; min-width:120px; }
.ng-city { font-size:14px; letter-spacing:.4em; color:var(--silver); text-transform:uppercase; margin-bottom:8px; }
.ng-abbr { font-family:'Bebas Neue',sans-serif; font-size:clamp(48px,8vw,80px); color:var(--white); line-height:1; }
.ng-sea { color:var(--teal); animation:seaGlow 2s ease-in-out infinite alternate; }
@keyframes seaGlow { 0%{text-shadow:0 0 10px rgba(0,92,92,.4)} 100%{text-shadow:0 0 30px rgba(0,168,168,1),0 0 60px rgba(0,92,92,.4)} }
.ng-vs { text-align:center; flex-shrink:0; padding:0 30px; }
.ng-vs-text { font-family:'Bebas Neue',sans-serif; font-size:36px; color:rgba(196,206,212,.4); letter-spacing:.2em; }
.ng-date { font-family:'Oswald',sans-serif; font-size:20px; color:var(--white); font-weight:600; margin-top:8px; }
.ng-time { font-size:16px; color:var(--gold); letter-spacing:.2em; margin-top:4px; }
.ng-arena { font-size:11px; letter-spacing:.3em; color:var(--silver); opacity:.5; margin-top:8px; text-transform:uppercase; }

/* ROSTER/STATS/ETC (Styles Kept Identical to Original) */
.roster-card { background:var(--navy); border:1px solid rgba(12,44,86,.6); padding:20px 18px; position:relative; overflow:hidden; transition:all .3s ease; opacity:1; }
.stat-number { font-family:'Bebas Neue',sans-serif; font-size:80px; color:var(--white); line-height:1; display:block; }

</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">SEA</div>
  <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
  <div class="loading-sub">Loading Seattle Mariners</div>
</div>

<canvas id="starfield"></canvas>
<div class="corner-deco">SEA ★ 1977</div>

<div class="hero">
  <div class="hero-bg-grid"></div>
  <div class="hero-glow"></div>
  <div class="author-tag">A Tribute To The Greatest Franchise</div>
  <div class="hero-title-row">
    <div class="hero-titles">
      <div class="big-title" style="animation-delay:.5s;">SEATTLE</div>
      <div class="big-title" style="animation-delay:.65s;">MARINERS</div>
    </div>
    <div class="photo-wrap">
      <div class="photo-ring pr1"></div>
      <div class="photo-ring pr2"></div>
      <div class="photo-ring pr3"></div>
      <div class="photo-orbit">
        <div class="po po1"></div><div class="po po2"></div>
        <div class="po po3"></div><div class="po po4"></div>
      </div>
      <img src="https://www.mlbstatic.com/team-logos/136.svg" class="photo-img">
    </div>
  </div>
  <div class="scroll-indicator">
    <div class="scroll-text">Explore Legacy</div>
    <div class="scroll-line"></div>
  </div>
</div>

<div class="scores-section">
  <div class="scores-inner">
    <div class="live-dot-wrap">
      <div class="live-dot" id="dynamic-live-dot"></div>
      <div class="live-label" id="live-status-label">MARINERS LIVE TRACKER</div>
    </div>

    <div class="next-game-card">
      <div class="next-game-tag" id="game-type-tag">REGULAR SEASON</div>
      <div class="next-game-matchup">
        <div class="ng-team">
          <div class="ng-city" id="away-team-name">LOADING</div>
          <div class="ng-abbr" id="away-team-score">--</div>
        </div>
        <div class="ng-vs">
          <div class="ng-vs-text">VS</div>
          <div id="live-game-info">
            <div class="ng-date" id="game-date-display">...</div>
            <div class="ng-time" id="game-time-display">Connecting to MLB Stats API</div>
          </div>
        </div>
        <div class="ng-team">
          <div class="ng-city" id="home-team-name">LOADING</div>
          <div class="ng-abbr ng-sea" id="home-team-score">--</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// INITIAL LOADING HIDE
window.addEventListener('load', () => {
    setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
    }, 1500);
});

// LIVE SCORE LOGIC
async function fetchMarinersData() {
    const teamId = 136; 
    const today = new Date().toISOString().split('T')[0];
    const url = `https://statsapi.mlb.com/api/v1/schedule/games/?sportId=1&teamId=${teamId}&date=${today}`;
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        
        const dot = document.getElementById('dynamic-live-dot');
        const statusLabel = document.getElementById('live-status-label');

        if (data.dates && data.dates.length > 0) {
            const game = data.dates[0].games[0];
            const state = game.status.abstractGameState; // Live, Preview, or Final

            // Update Names
            document.getElementById('away-team-name').innerText = game.teams.away.team.name;
            document.getElementById('home-team-name').innerText = game.teams.home.team.name;

            // Update Scores
            document.getElementById('away-team-score').innerText = game.teams.away.score ?? 0;
            document.getElementById('home-team-score').innerText = game.teams.home.score ?? 0;

            if (state === "Live") {
                dot.style.display = "inline-block";
                statusLabel.innerText = "LIVE NOW";
                document.getElementById('game-date-display').innerText = "IN PROGRESS";
                document.getElementById('game-time-display').innerText = `${game.linescore.inningState} ${game.linescore.currentInningOrdinal}`;
            } else if (state === "Preview") {
                dot.style.display = "none";
                statusLabel.innerText = "UPCOMING GAME";
                const gameTime = new Date(game.gameDate).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                document.getElementById('game-date-display').innerText = "TODAY";
                document.getElementById('game-time-display').innerText = gameTime;
            } else {
                dot.style.display = "none";
                statusLabel.innerText = "GAME COMPLETED";
                document.getElementById('game-date-display').innerText = "FINAL";
                document.getElementById('game-time-display').innerText = "Check Back Tomorrow";
            }
        } else {
            document.getElementById('game-date-display').innerText = "OFF DAY";
            document.getElementById('game-time-display').innerText = "No game scheduled for today";
        }
    } catch (e) {
        console.error("Scoreboard Error:", e);
    }
}

// Starfield Background Animation
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function initStars() {
    stars = [];
    for(let i=0; i<150; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: Math.random() * 0.5
        });
    }
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#C4CED4';
    stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
        ctx.fill();
        s.y += s.speed;
        if(s.y > canvas.height) s.y = 0;
    });
    requestAnimationFrame(drawStars);
}

window.addEventListener('resize', resize);
resize();
initStars();
drawStars();

// Initial Fetch and Interval
fetchMarinersData();
setInterval(fetchMarinersData, 60000); // Update every minute
</script>

</body>
</html>
